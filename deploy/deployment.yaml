apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuis
  namespace: kuis
  labels:
    app.kubernetes.io/name: kuis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kuis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kuis
    spec:
      serviceAccountName: kuis
      containers:
        - name: kuis
          image: ghcr.io/romainmiras/kuis:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KUIS_PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/namespaces
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/namespaces
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
